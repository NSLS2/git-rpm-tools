name: Run oneself to build self rpm
on: workflow_dispatch
jobs:
  build-upload:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v2
        with:
          persist-credentials: false
      - run: ./scripts/git-rpm-tools
      - uses: actions/upload-artifact@v3
        with:
          name: rpms
          path: ./*.rpm
